services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: synthio
      POSTGRES_PASSWORD: synthio
      POSTGRES_DB: synthio
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synthio"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://synthio:synthio@postgres:5432/synthio
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data
    volumes:
      - ./api:/app
      - ./data:/data:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build: ./web
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
